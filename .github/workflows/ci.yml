name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test

      - name: Smoke test — tools
        timeout-minutes: 1
        run: |
          echo '{"jsonrpc":"2.0","method":"tools/list","id":1}' \
            | node dist/index.js 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          tools = sorted(t['name'] for t in d['result']['tools'])
          expected = sorted([
              'memory_add', 'memory_search', 'memory_update', 'memory_delete',
              'memory_inspect', 'memory_export', 'memory_health',
              'memory_session_start', 'memory_session_end', 'memory_session_list',
          ])
          assert tools == expected, f'Tool list mismatch: {tools}'
          print(f'OK: {len(tools)} tools registered')
          "

      - name: Smoke test — resources & prompts
        timeout-minutes: 1
        run: |
          echo '{"jsonrpc":"2.0","method":"resources/list","id":2}' \
            | node dist/index.js 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          res = d['result']['resources']
          assert len(res) == 2, f'Expected 2 resources, got {len(res)}'
          print(f'OK: {len(res)} resources')
          "
          echo '{"jsonrpc":"2.0","method":"prompts/list","id":3}' \
            | node dist/index.js 2>/dev/null \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          prompts = d['result']['prompts']
          assert len(prompts) == 3, f'Expected 3 prompts, got {len(prompts)}'
          print(f'OK: {len(prompts)} prompts')
          "
